name: main
version: "1.0.0"
description: "主工作流 — 包含 LLM 调用示例"

tools:
  - name: read_file
    type: builtin

  - name: write_file
    type: builtin

  - name: llm_chat
    type: builtin
    # ★ 无需配置 model/api_key —— 自动从主 Agent 继承
    # ★ 如需覆盖，在 step args 中传 model/api_key

  - name: bash
    type: builtin

pipeline:
  # 步骤示例 1: 读文件
  - step: read_input
    tool: read_file
    args:
      path: "{{file_path}}"
    output: raw_content
    on_fail: fail

  # 步骤示例 2: 调用 LLM（配置自动继承）
  - step: analyze
    tool: llm_chat
    args:
      prompt: "请分析以下内容：\n{{raw_content}}"
      system_prompt: "你是一个分析助手。请用中文回答。"
    # ★ 如果想单独覆盖模型:
    # model: "gpt-4o"
    # api_key: "sk-xxx"
    output: llm_result
    on_fail: continue        # LLM 不可用时自动跳过

  # 步骤示例 3: 保存结果
  - step: save_result
    tool: bash
    args:
      command: "cat > {{shared_context.package_dir}}/output/result.json << 'EOF'\n{{steps.analyze.output}}\nEOF"
      timeout: 10
    output: saved
    on_fail: fail

permissions:
  filesystem:
    read: ["**"]
    write: ["output/**"]
  subprocess:
    max_concurrent: 1
    allowed_commands: ["cat", "echo", "python3"]
  resources:
    memory_limit: "128MB"
    timeout: 60
